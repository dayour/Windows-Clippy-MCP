  :root { color-scheme: light dark; }
  body { margin: 0; }
  .clippy-fleet {
    font: 13px/1.45 "Segoe UI", system-ui, -apple-system, sans-serif;
    color: var(--mcp-ui-color-foreground, #111);
    background: var(--mcp-ui-color-background, #fff);
    padding: 12px 14px;
    min-width: 260px;
  }
  .clippy-fleet__header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 8px;
    margin: 0 0 10px;
  }
  .clippy-fleet__header h1 {
    font-size: 14px;
    font-weight: 600;
    margin: 0;
    letter-spacing: 0.01em;
  }
  .clippy-fleet__status {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 2px 6px;
    border-radius: 3px;
    background: rgba(127, 127, 127, 0.12);
    color: inherit;
  }
  .clippy-fleet__status.is-connected {
    background: rgba(38, 166, 91, 0.15);
    color: #0a7d3a;
  }
  .clippy-fleet__status.is-pending {
    background: rgba(235, 170, 50, 0.18);
    color: #8a5a00;
  }
  .clippy-fleet__warning {
    font-size: 11px;
    background: rgba(216, 64, 64, 0.10);
    border: 1px solid rgba(216, 64, 64, 0.35);
    color: #8a1f1f;
    padding: 6px 8px;
    border-radius: 3px;
    margin: 0 0 10px;
  }
  .clippy-fleet__placeholder {
    font-size: 12px;
    color: #666;
    margin: 0;
  }
  .clippy-fleet__grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 6px;
    margin: 0 0 12px;
  }
  .clippy-metric {
    border: 1px solid rgba(127, 127, 127, 0.25);
    border-radius: 4px;
    padding: 6px 8px;
    min-width: 0;
  }
  .clippy-metric__value {
    font-size: 18px;
    font-weight: 600;
    line-height: 1.1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .clippy-metric__label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #666;
    margin-top: 2px;
  }
  .clippy-section-title {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    align-items: baseline;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #666;
    margin: 0 0 8px;
  }
  .clippy-flipgrid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
  }
  .clippy-flipcard {
    border: 1px solid rgba(127, 127, 127, 0.28);
    border-radius: 8px;
    padding: 8px;
    min-width: 0;
    background: rgba(127, 127, 127, 0.05);
  }
  .clippy-flipcard__header {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    align-items: flex-start;
    margin: 0 0 8px;
  }
  .clippy-flipcard__type {
    font-weight: 600;
    font-size: 12px;
    text-transform: capitalize;
  }
  .clippy-flipcard__entity {
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font: 10px/1.4 "Cascadia Code", Consolas, monospace;
    color: #666;
  }
  .clippy-flipcard__state {
    flex: 0 0 auto;
    font-size: 10px;
    border-radius: 999px;
    padding: 2px 6px;
    background: rgba(127, 127, 127, 0.15);
    color: inherit;
  }
  .clippy-flipcard__state.state-thinking,
  .clippy-flipcard__state.state-speaking {
    background: rgba(91, 95, 199, 0.18);
    color: #3b3fbd;
  }
  .clippy-flipcard__state.state-ready,
  .clippy-flipcard__state.state-active {
    background: rgba(38, 166, 91, 0.15);
    color: #0a7d3a;
  }
  .clippy-flipcard__state.state-error,
  .clippy-flipcard__state.state-faulted {
    background: rgba(216, 64, 64, 0.12);
    color: #8a1f1f;
  }
  .clippy-flipcard__fields {
    margin: 0;
    display: grid;
    gap: 5px;
  }
  .clippy-flipcard__field {
    min-width: 0;
  }
  .clippy-flipcard__field dt {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #666;
  }
  .clippy-flipcard__field dd {
    margin: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 11px;
  }
  .clippy-flipcard__footer {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    align-items: center;
    margin: 8px 0 0;
    color: #666;
    font-size: 10px;
  }
  .clippy-flipcard__footer button {
    border: 1px solid rgba(127, 127, 127, 0.35);
    border-radius: 4px;
