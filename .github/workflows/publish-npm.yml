name: Publish NPM Package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (leave empty for package.json version)'
        required: false
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      DOTNET_NOLOGO: true
      NPM_CONFIG_AUDIT: false
      NPM_CONFIG_FUND: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25.7.0'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Update version if specified
        if: github.event.inputs.version != ''
        run: npm version ${{ github.event.inputs.version }} --no-git-tag-version

      - name: Install dependencies
        run: npm ci

      - name: Build MCP Apps views
        run: npm run build:views

      - name: Build native widget payloads
        shell: pwsh
        run: |
          dotnet build Windows-Clippy-MCP.sln -c Release -nologo
          dotnet build widget\TerminalHost\TerminalHost.csproj -c Debug -nologo

      - name: Validate package payload
        run: npm run validate

      - name: Pack dry run
        run: npm pack --dry-run

      - name: Publish to NPM
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release (if manual)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.event.inputs.version || 'auto' }}
          release_name: Release v${{ github.event.inputs.version || 'auto' }}
          body: |
            ## NPM Package Published

            This release includes the NPM package for one-click installation:

            ```bash
            npm install -g @dayour/windows-clippy-mcp
            ```

            ### What's New
            - One-click NPM installation support
            - Automated VS Code configuration
            - Windows service integration
            - Both NPM and traditional installation methods supported

            See [NPM-INSTALL.md](NPM-INSTALL.md) for complete installation instructions.
          draft: false
          prerelease: false
